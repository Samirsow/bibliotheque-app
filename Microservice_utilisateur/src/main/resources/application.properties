spring.application.name=utilisateur

server.port=8082
server.servlet.context-path=/gestion

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_utilisateur?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - ? Version simplifiée
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.Bu.Microservice.utilisateur=DEBUG
# Debug complet
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

debug=true

# Eureka (désactivé pour tester)
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false



# JWT
app.jwt.secret=1234567890123456789012345678901234567890123456789012345678901234
app.jwt.expiration-ms=86400000
